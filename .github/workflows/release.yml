name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --workspace --dry-run instead of publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  cargo-release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Publish dry run
        if: ${{ inputs.dry_run == 'true' }}
        run: cargo publish --workspace --dry-run

      - name: Publish crates
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version() {
            local crate="$1"
            cargo metadata --no-deps --format-version 1 \
              | python3 -c 'import json, sys; crate = sys.argv[1]; versions = [p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == crate]; print(versions[0]) if versions else sys.exit(f"missing workspace package: {crate}")' "${crate}"
          }

          crate_is_published() {
            local crate="$1"
            local version="$2"
            curl --fail --silent --show-error \
              --header "User-Agent: semantic-pdf-diff-release (https://github.com/eraydin/semantic-pdf-diff)" \
              "https://crates.io/api/v1/crates/${crate}/${version}" \
              > /dev/null 2>&1
          }

          publish_crate() {
            local crate="$1"
            local version
            version="$(crate_version "${crate}")"
            if crate_is_published "${crate}" "${version}"; then
              echo "Skipping ${crate} ${version}; already published"
              return
            fi

            local publish_log
            publish_log="$(mktemp)"
            for attempt in 1 2 3 4 5; do
              echo "Publishing ${crate} ${version} (attempt ${attempt})"
              if cargo publish -p "${crate}" 2>&1 | tee "${publish_log}"; then
                # crates.io index propagation is eventually consistent. A short wait
                # keeps dependent workspace crates from resolving too early.
                sleep 30
                rm -f "${publish_log}"
                return
              fi

              if grep -q "already exists on crates.io index" "${publish_log}"; then
                echo "Skipping ${crate} ${version}; already published"
                rm -f "${publish_log}"
                return
              fi

              if grep -q "status 429 Too Many Requests" "${publish_log}"; then
                echo "crates.io rate limited ${crate}; waiting 5 minutes before retry"
                sleep 300
                continue
              fi

              return 1
            done

            echo "Failed to publish ${crate} ${version} after retrying crates.io rate limits"
            return 1
          }

          publish_crate spdfdiff_types
          publish_crate pdf_content
          publish_crate pdf_core
          publish_crate pdf_text
          publish_crate pdf_semantic
          publish_crate diff_report
          publish_crate diff_core
          publish_crate spdfdiff_cli
