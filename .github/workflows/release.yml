name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish dry-run instead of publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: crates-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  cargo-release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
      RELEASE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt, clippy

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "${base_version}" ]]; then
            echo "VERSION is empty" >&2
            exit 1
          fi

          case "${GITHUB_REF_NAME}" in
            main)
              release_channel="stable"
              release_version="${base_version}"
              dependency_requirement="${base_version}"
              ;;
            dev)
              release_channel="preview"
              release_version="${base_version}-preview.${GITHUB_RUN_NUMBER}"
              dependency_requirement="=${release_version}"
              ;;
            *)
              echo "Release workflow only supports main and dev, got ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          echo "release_channel=${release_channel}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "dependency_requirement=${dependency_requirement}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ${release_channel} release ${release_version}"

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/set_workspace_version.py \
            "${{ steps.version.outputs.release_version }}" \
            --internal-dependency-requirement "${{ steps.version.outputs.dependency_requirement }}"
          cargo generate-lockfile
          cargo metadata --no-deps --format-version 1 > /dev/null

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Publish dry run
        if: ${{ env.RELEASE_DRY_RUN == 'true' }}
        run: cargo publish --workspace --dry-run --allow-dirty

      - name: Publish crates
        if: ${{ env.RELEASE_DRY_RUN != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version() {
            local crate="$1"
            cargo metadata --no-deps --format-version 1 \
              | python3 -c 'import json, sys; crate = sys.argv[1]; versions = [p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == crate]; print(versions[0]) if versions else sys.exit(f"missing workspace package: {crate}")' "${crate}"
          }

          crate_is_published() {
            local crate="$1"
            local version="$2"
            curl --fail --silent --show-error \
              --header "User-Agent: semantic-pdf-diff-release (https://github.com/eraydin/semantic-pdf-diff)" \
              "https://crates.io/api/v1/crates/${crate}/${version}" \
              > /dev/null 2>&1
          }

          publish_crate() {
            local crate="$1"
            local version
            version="$(crate_version "${crate}")"
            if crate_is_published "${crate}" "${version}"; then
              echo "Skipping ${crate} ${version}; already published"
              return
            fi

            local publish_log
            publish_log="$(mktemp)"
            for attempt in 1 2 3 4 5; do
              echo "Publishing ${crate} ${version} (attempt ${attempt})"
              if cargo publish -p "${crate}" --allow-dirty 2>&1 | tee "${publish_log}"; then
                # crates.io index propagation is eventually consistent. A short wait
                # keeps dependent workspace crates from resolving too early.
                sleep 30
                rm -f "${publish_log}"
                return
              fi

              if grep -q "already exists on crates.io index" "${publish_log}"; then
                echo "Skipping ${crate} ${version}; already published"
                rm -f "${publish_log}"
                return
              fi

              if grep -q "status 429 Too Many Requests" "${publish_log}"; then
                echo "crates.io rate limited ${crate}; waiting 5 minutes before retry"
                sleep 300
                continue
              fi

              return 1
            done

            echo "Failed to publish ${crate} ${version} after retrying crates.io rate limits"
            return 1
          }

          publish_crate spdfdiff_types
          publish_crate pdf_content
          publish_crate pdf_core
          publish_crate pdf_text
          publish_crate pdf_semantic
          publish_crate diff_report
          publish_crate diff_core
          publish_crate spdfdiff_cli

      - name: Create GitHub release
        if: ${{ env.RELEASE_DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.release_version }}"
          channel="${{ steps.version.outputs.release_channel }}"
          tag="v${version}"

          if gh release view "${tag}" > /dev/null 2>&1; then
            echo "Skipping ${tag}; GitHub release already exists"
            exit 0
          fi

          release_flags=()
          if [[ "${channel}" == "preview" ]]; then
            release_flags+=(--prerelease --latest=false)
          else
            release_flags+=(--latest)
          fi

          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "semantic-pdf-diff ${version}" \
            --notes "Automated ${channel} release for semantic-pdf-diff ${version}. Crates are published to crates.io." \
            "${release_flags[@]}"
